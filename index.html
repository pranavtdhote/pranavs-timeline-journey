  <body>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="color:red;font-size:16px;z-index:999999;position:fixed;top:0;left:0;background:black;padding:20px;">' + e.message + '<br>' + e.filename + ':' + e.lineno + '</div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="color:red;font-size:16px;z-index:999999;position:fixed;top:50px;left:0;background:black;padding:20px;">Promise Rejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason) + '</div>';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
